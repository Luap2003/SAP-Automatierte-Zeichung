apiVersion: apps/v1
kind: Deployment
metadata:
  name: iso10110-generator
  namespace: iso10110-generator
  labels:
    app: iso10110-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iso10110-generator
  template:
    metadata:
      labels:
        app: iso10110-generator
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8worker2.dev-geheimprojekt.de
      imagePullSecrets:
        - name: gitlab-registry-auth
      containers:
        - name: iso10110-generator
          image: gitlab-geheimprojekt.de:5050/rastplatz/iso10110-generator:latest
          ports:
            - containerPort: 8501
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: iso10110-generator
  namespace: iso10110-generator
  labels:
    app: iso10110-generator
spec:
  type: ClusterIP
  selector:
    app: iso10110-generator
  ports:
    - port: 8501
      targetPort: 8501
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iso10110-generator
  namespace: iso10110-generator
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-websocket: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: iso10110.dev-geheimprojekt.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iso10110-generator
                port:
                  number: 8501
  tls:
    - hosts:
        - iso10110.dev-geheimprojekt.de
      secretName: iso10110-tls-secret
